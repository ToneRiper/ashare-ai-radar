name: AShare Radar

on:
  workflow_dispatch:

  schedule:
    # 交易时间内每 20 分钟疯狂巡逻一次 (北京时间 9:00 - 15:00 覆盖)
    # 对应的 UTC 时间是 01:00 到 07:00，每20分钟执行一次
    - cron: '*/20 1-6 * * 1-5'
    
    # 额外增加一个 9:25 竞价卡点分析 (UTC 01:25)
    - cron: '25 1 * * 1-5'
    
    # 额外增加一个 14:50 尾盘狙击卡点 (UTC 06:50)
    - cron: '50 6 * * 1-5'
    
    # 晚上 21:00 深度复盘卡点 (UTC 13:00)
    - cron: '0 13 * * 1-5'

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --force-reinstall requests bs4 feedparser deep-translator openai google-generativeai

      - name: Fetch MIIT
        run: python fetch_miit.py || true

      - name: Fetch NDRC
        run: python fetch_ndrc.py || true

      - name: Fetch GOV
        run: python fetch_gov.py || true

      - name: Fetch Global
        run: python fetch_global.py || true

      - name: Run Radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      - name: Commit Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add history.json || true
          git add index.html || true
          git add data/*.json || true
          git diff --cached --quiet || git commit -m "update radar data and cache"
          git push
