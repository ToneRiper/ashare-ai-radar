name: AShare Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '7 * * * *'

permissions:
  contents: write

jobs:
  radar:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch MIIT
        run: |
          python fetch_miit.py

      - name: Fetch NDRC
        run: |
          python fetch_ndrc.py

      - name: Fetch GOV
        run: |
          python fetch_gov.py

      - name: Fetch Global
        run: |
          python fetch_global.py

      - name: Run Radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          python main.py

      - name: Commit Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history.json
          git add trend.json
          git add hot_rank.json
          git add hot_streak.json
          git add data/*.json

          git diff --cached --quiet || git commit -m "update radar data"

          git push
