name: AShare Radar

on:
  workflow_dispatch:

  schedule:
    - cron: '30 1,2,3,4,5,6,7 * * 1-5'
    - cron: '0 13 * * 1-5'

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 必须加这个才能提交网页

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --force-reinstall requests bs4 feedparser deep-translator openai google-generativeai

      - name: Fetch MIIT
        run: python fetch_miit.py || true

      - name: Fetch NDRC
        run: python fetch_ndrc.py || true

      - name: Fetch GOV
        run: python fetch_gov.py || true

      - name: Fetch Global
        run: python fetch_global.py || true

      - name: Run Radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add history.json || true
          git add index.html || true
          git add trend.json || true
          git add hot_rank.json || true
          git add hot_streak.json || true
          git add data/*.json || true
          git diff --cached --quiet || git commit -m "update radar data and dashboard"
          git push
