name: AShare Radar

on:
  workflow_dispatch:

  schedule:
    # 盘中刺客模式：工作日北京时间 9:30 到 15:30，每小时执行一次 (UTC 1:30-7:30)
    - cron: '30 1,2,3,4,5,6,7 * * 1-5'
    # 盘后守夜人模式：工作日北京时间 21:00 准时生成全天宏观战报 (UTC 13:00)
    - cron: '0 13 * * 1-5'

permissions:
  contents: write

jobs:
  radar:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --force-reinstall requests bs4 feedparser deep-translator openai google-generativeai

      - name: Fetch MIIT
        run: |
          python fetch_miit.py

      - name: Fetch NDRC
        run: |
          python fetch_ndrc.py

      - name: Fetch GOV
        run: |
          python fetch_gov.py

      - name: Fetch Global
        run: |
          python fetch_global.py

      - name: Run Radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Commit Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history.json
          git add index.html
          git add trend.json
          git add hot_rank.json
          git add hot_streak.json
          git add data/*.json

          git diff --cached --quiet || git commit -m "update radar data"

          git push
