
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>

            .card h2 { color: #fbbf24; border-bottom: 2px solid #fbbf24; padding-bottom: 10px; margin-top: 0; }

        <div class="container">

            </div>
        </div>
        <script>

            var option = { tooltip: { trigger: 'item' }, series: [{ name: '热度', type: 'pie', radius: ['40%', '70%'], itemStyle: { borderRadius: 10, borderColor: '#1e293b', borderWidth: 2 }, label: { color: '#e2e8f0', fontSize: 14 }, data: [{"value": 1, "name": "部委政策与国企"}, {"value": 1, "name": "卫健委与前沿医疗"}, {"value": 2, "name": "AI与算力基建"}, {"value": 3, "name": "新旧能源与智能车"}] }] };
